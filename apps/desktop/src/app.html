<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="color-scheme" content="light dark" />
	<script>
		(function () {
			try {
				var stored = localStorage.getItem("mode-watcher-mode");
				var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
				var resolved = stored && stored !== "system" ? stored : (prefersDark ? "dark" : "light");
				var root = document.documentElement;
				if (resolved === "dark") {
					root.classList.add("dark");
					root.setAttribute("data-theme", "dark");
				} else {
					root.setAttribute("data-theme", "light");
				}
			} catch (_) {}
		})();
	</script>
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div id="boot" aria-hidden="true">
		<div class="boot-wrap">
			<div class="logo-outer">
				<div class="logo-inner">
					<img src="/logo.svg" alt="" class="boot-logo" width="96" height="96" />
				</div>
			</div>

			<div class="boot-footer">
				<div class="loader"><span></span></div>
				<div class="boot-text">Open Source Screen Recorder</div>
			</div>
		</div>

		<style>
			#boot {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				align-items: center;
				justify-content: center;
				background: hsl(40 30% 96%);
				color: hsl(0 0% 9.8%);
				font-family: "Google Sans", "Geist Variable", "Inter", system-ui, -apple-system, sans-serif;
				transition: opacity 280ms ease-out;
				will-change: opacity;
			}

			html.dark #boot,
			html[data-theme="dark"] #boot {
				background: linear-gradient(#393737, #1b1b1b);
				color: hsl(0 0% 94%);
			}

			#boot.boot-leaving {
				opacity: 0;
				pointer-events: none;
			}

			#boot .boot-wrap {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 48px;
			}

			#boot .logo-outer {
				display: grid;
				place-items: center;
				animation: boot-breathe 2.4s ease-in-out 400ms infinite;
				will-change: transform;
			}

			#boot .logo-inner {
				display: grid;
				place-items: center;
				animation: boot-pop 400ms cubic-bezier(0.2, 0.7, 0.3, 1) both;
				will-change: transform, opacity;
			}

			#boot .boot-logo {
				width: auto;
				height: 120px;
				display: block;
				filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.18));
			}

			#boot .boot-footer {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 14px;
			}

			#boot .loader {
				position: relative;
				height: 2px;
				width: 192px;
				overflow: hidden;
				border-radius: 999px;
				background: hsl(220 13% 91%);
			}

			html.dark #boot .loader,
			html[data-theme="dark"] #boot .loader {
				background: hsl(0 0% 18%);
			}

			#boot .loader span {
				position: absolute;
				inset: 0;
				background: linear-gradient(
					90deg,
					transparent,
					hsl(175.18deg 84.05% 31.96%),
					transparent
				);
				animation: boot-slide 1.2s ease-in-out infinite;
				opacity: 0.95;
			}

			html.dark #boot .loader span,
			html[data-theme="dark"] #boot .loader span {
				background: linear-gradient(
					90deg,
					transparent,
					hsl(75 100% 50%),
					transparent
				);
			}

			#boot .boot-text {
				font-size: 10px;
				letter-spacing: 0.2em;
				text-transform: uppercase;
				color: hsl(220 8.9% 46.1%);
				font-family: "Space Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
				animation: boot-pulse 2s ease-in-out infinite;
			}

			html.dark #boot .boot-text,
			html[data-theme="dark"] #boot .boot-text {
				color: hsl(0 0% 55%);
			}

			@keyframes boot-pop {
				from {
					transform: scale(0.85);
					opacity: 0;
				}
				to {
					transform: scale(1);
					opacity: 1;
				}
			}

			@keyframes boot-breathe {
				0%, 100% {
					transform: scale(1);
				}
				50% {
					transform: scale(1.04);
				}
			}

			@keyframes boot-slide {
				from {
					transform: translateX(-100%);
				}
				to {
					transform: translateX(100%);
				}
			}

			@keyframes boot-pulse {
				0%, 100% {
					opacity: 0.45;
				}
				50% {
					opacity: 1;
				}
			}

			@media (prefers-reduced-motion: reduce) {
				#boot .logo-outer,
				#boot .logo-inner,
				#boot .loader span,
				#boot .boot-text {
					animation: none;
				}
				#boot .loader span {
					opacity: 0.6;
					transform: none;
				}
			}
		</style>
	</div>

	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
