name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

concurrency:
  group: release-desktop-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.23.0"
  RUST_BACKTRACE: "1"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  # FFmpeg version pinned for reproducible release builds. Bump deliberately;
  # do NOT track "latest". The Windows build comes from gyan.dev's release
  # essentials archive; macOS from evermeet.cx; Linux from johnvansickle.com.
  FFMPEG_VERSION: "7.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      tag_name: ${{ steps.resolve_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: resolve_tag
        shell: bash
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build release body from CHANGELOG.md
        id: build_body
        shell: bash
        env:
          TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          body_file="$(mktemp)"

          if node scripts/extract-changelog.mjs "$version" --out changelog-section.md > /dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            {
              echo "## What's new in ${TAG}"
              echo
              cat changelog-section.md
              echo
            } > "$body_file"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No CHANGELOG.md section for ${version}; falling back to auto-generated notes."
            : > "$body_file"
          fi

          {
            echo "## Installation and signing notes"
            echo "Release assets include GitHub artifact attestations for build provenance."
            echo "Windows and macOS builds may still show OS security prompts because OS code-signing is not configured."
            echo "If blocked by OS warnings, verify the release from the repository:"
            echo "https://github.com/kanakkholwal/recast"
            echo
            echo "Verify release integrity with GitHub CLI:"
            echo '```sh'
            echo "gh release verify ${TAG} -R kanakkholwal/recast"
            echo "gh release verify-asset ${TAG} path/to/downloaded-asset -R kanakkholwal/recast"
            echo "gh attestation verify path/to/downloaded-asset -R kanakkholwal/recast"
            echo '```'
          } >> "$body_file"

          # Pass body as a multi-line GH Actions output.
          {
            echo "body<<__BODY_EOF__"
            cat "$body_file"
            echo "__BODY_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create or reuse draft release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: Recast ${{ steps.resolve_tag.outputs.tag }}
          draft: true
          prerelease: false
          # Auto-generate "what's changed" only when the changelog has no section
          # for this tag; otherwise the curated CHANGELOG entry wins.
          generate_release_notes: ${{ steps.build_body.outputs.found != 'true' }}
          body: ${{ steps.build_body.outputs.body }}

  build-desktop:
    name: Build (${{ matrix.platform.name }})
    needs: create-release
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - name: macos-x64
            os: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
          - name: linux-x64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ""
          - name: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ""
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"
          key: ${{ matrix.platform.rust_target }}
          shared-key: tauri-${{ matrix.platform.name }}
          cache-on-failure: true

      - name: Cache turbo build outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ matrix.platform.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ matrix.platform.os }}-

      - name: Install Linux system dependencies
        if: matrix.platform.os == 'ubuntu-24.04'
        run: |
          # The `pipewire` Rust crate 0.9.x (a transitive dependency of `xcap`)
          # generates bindings against PipeWire >= 1.4. Ubuntu 24.04 ships
          # PipeWire 1.0.5, which omits fields like `spa_video_info_raw.flags`
          # and changes `modifier` from u64 to i64 — producing the libspa
          # build errors we hit. Pulling pipewire-upstream's PPA gives us the
          # newer headers without locking the runner image to a future Ubuntu.
          sudo add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libgbm-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache FFmpeg sidecars
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: apps/desktop/src-tauri/binaries
          key: ffmpeg-${{ env.FFMPEG_VERSION }}-${{ matrix.platform.rust_target }}

      - name: Download FFmpeg sidecars (Windows)
        if: matrix.platform.os == 'windows-latest' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $triple = "${{ matrix.platform.rust_target }}"
          $dest = "apps/desktop/src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extract -Force
          $bin = Get-ChildItem -Path ffmpeg-extract -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $probe = Get-ChildItem -Path ffmpeg-extract -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          if (-not $bin -or -not $probe) { throw "ffmpeg/ffprobe not found in archive" }
          Copy-Item $bin.FullName "$dest/ffmpeg-$triple.exe" -Force
          Copy-Item $probe.FullName "$dest/ffprobe-$triple.exe" -Force
          Remove-Item -Recurse -Force ffmpeg.zip, ffmpeg-extract

      - name: Download FFmpeg sidecars (macOS)
        if: matrix.platform.os == 'macos-latest' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          triple="${{ matrix.platform.rust_target }}"
          dest="apps/desktop/src-tauri/binaries"
          mkdir -p "$dest"
          # evermeet.cx ships universal2 binaries that work on both arm64 and x64.
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o ffmpeg.zip
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o ffprobe.zip
          unzip -o ffmpeg.zip -d ffmpeg-extract
          unzip -o ffprobe.zip -d ffmpeg-extract
          # Copy the universal binary into the CI sidecars for the requested
          # triple and also the alternate macOS triple. This ensures the build
          # succeeds even if the tauri bundler resolves a different target
          # triple (runner arch vs requested target) at bundle time.
          cp ffmpeg-extract/ffmpeg "$dest/ffmpeg-$triple"
          cp ffmpeg-extract/ffprobe "$dest/ffprobe-$triple"
          # Also write both common macOS triples so the bundler never misses
          # a sidecar when it expects the other triple.
          cp ffmpeg-extract/ffmpeg "$dest/ffmpeg-aarch64-apple-darwin" || true
          cp ffmpeg-extract/ffprobe "$dest/ffprobe-aarch64-apple-darwin" || true
          cp ffmpeg-extract/ffmpeg "$dest/ffmpeg-x86_64-apple-darwin" || true
          cp ffmpeg-extract/ffprobe "$dest/ffprobe-x86_64-apple-darwin" || true
          chmod +x "$dest"/ffmpeg-* "$dest"/ffprobe-* || true
          rm -rf ffmpeg.zip ffprobe.zip ffmpeg-extract

      - name: Download FFmpeg sidecars (Linux)
        if: matrix.platform.os == 'ubuntu-24.04' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          triple="${{ matrix.platform.rust_target }}"
          dest="apps/desktop/src-tauri/binaries"
          mkdir -p "$dest"
          curl -L "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" -o ffmpeg.tar.xz
          mkdir -p ffmpeg-extract
          tar -xf ffmpeg.tar.xz -C ffmpeg-extract --strip-components=1
          cp ffmpeg-extract/ffmpeg "$dest/ffmpeg-$triple"
          cp ffmpeg-extract/ffprobe "$dest/ffprobe-$triple"
          chmod +x "$dest/ffmpeg-$triple" "$dest/ffprobe-$triple"
          rm -rf ffmpeg.tar.xz ffmpeg-extract

      - name: Verify FFmpeg sidecars (encoders required for export)
        shell: bash
        run: |
          set -euo pipefail
          triple="${{ matrix.platform.rust_target }}"
          dest="apps/desktop/src-tauri/binaries"
          if [[ "${{ matrix.platform.os }}" == "windows-latest" ]]; then
            bin="$dest/ffmpeg-$triple.exe"
          else
            bin="$dest/ffmpeg-$triple"
          fi
          [[ -x "$bin" ]] || { echo "::error::ffmpeg sidecar missing or not executable: $bin"; exit 1; }
          encoders=$("$bin" -hide_banner -encoders)
          for codec in libx264 aac libvpx-vp9 libopus; do
            if ! echo "$encoders" | grep -q " $codec "; then
              echo "::error::Required encoder missing from bundled ffmpeg: $codec"
              exit 1
            fi
          done
          "$bin" -version | head -n1

      - name: Build Tauri app
        shell: bash
        run: pnpm --filter recast-desktop tauri build ${{ matrix.platform.tauri_args }}

      - name: Package MSIX (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        env:
          TAG: ${{ needs.create-release.outputs.tag_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:TAG.TrimStart('v')
          # MSIX requires a 4-part numeric version (a.b.c.d). Pad with zeros and
          # strip any pre-release suffix so packaging never trips on tags like
          # v1.2.3-beta.
          $core = ($version -split '[-+]')[0]
          $parts = @($core -split '\.') | Where-Object { $_ -match '^\d+$' }
          while ($parts.Count -lt 4) { $parts += '0' }
          $msixVersion = ($parts[0..3] -join '.')

          $releaseDir = "apps/desktop/src-tauri/target/release"
          if (-not (Test-Path "$releaseDir/recast.exe")) {
            # Some Tauri targets nest the binary under the triple-specific path.
            $releaseDir = "apps/desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release"
          }
          if (-not (Test-Path "$releaseDir/recast.exe")) {
            throw "recast.exe not found under target/release"
          }

          $staging = "msix-staging"
          Remove-Item -Recurse -Force $staging -ErrorAction Ignore
          New-Item -ItemType Directory -Force -Path "$staging/Assets" | Out-Null

          Copy-Item "$releaseDir/recast.exe" "$staging/recast.exe"
          Get-ChildItem $releaseDir -Filter "ffmpeg-*.exe" -ErrorAction Ignore |
            Copy-Item -Destination $staging
          Get-ChildItem $releaseDir -Filter "ffprobe-*.exe" -ErrorAction Ignore |
            Copy-Item -Destination $staging
          Get-ChildItem $releaseDir -Filter "*.dll" -ErrorAction Ignore |
            Copy-Item -Destination $staging
          if (Test-Path "$releaseDir/resources") {
            Copy-Item -Recurse "$releaseDir/resources" "$staging/resources"
          }

          $icons = "apps/desktop/src-tauri/icons"
          Copy-Item "$icons/Square150x150Logo.png" "$staging/Assets/Square150x150Logo.png"
          Copy-Item "$icons/Square44x44Logo.png"   "$staging/Assets/Square44x44Logo.png"
          Copy-Item "$icons/StoreLogo.png"         "$staging/Assets/StoreLogo.png"

          $manifest = @"
          <?xml version="1.0" encoding="utf-8"?>
          <Package
            xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
            xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
            xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities"
            IgnorableNamespaces="uap rescap">
            <Identity Name="com.nexonauts.recast" Publisher="CN=Nexonauts" Version="$msixVersion" ProcessorArchitecture="x64" />
            <Properties>
              <DisplayName>Recast</DisplayName>
              <PublisherDisplayName>Nexonauts</PublisherDisplayName>
              <Logo>Assets\StoreLogo.png</Logo>
            </Properties>
            <Dependencies>
              <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22621.0" />
            </Dependencies>
            <Resources>
              <Resource Language="en-us" />
            </Resources>
            <Applications>
              <Application Id="Recast" Executable="recast.exe" EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements
                  DisplayName="Recast"
                  Description="Recast offline-first desktop recorder and editor"
                  BackgroundColor="transparent"
                  Square150x150Logo="Assets\Square150x150Logo.png"
                  Square44x44Logo="Assets\Square44x44Logo.png" />
              </Application>
            </Applications>
            <Capabilities>
              <rescap:Capability Name="runFullTrust" />
            </Capabilities>
          </Package>
          "@
          # Strip the leading indentation we used to keep the YAML readable.
          $manifest = ($manifest -split "`r?`n" | ForEach-Object { $_ -replace '^          ', '' }) -join "`r`n"
          Set-Content -Path "$staging/AppxManifest.xml" -Value $manifest -Encoding UTF8

          $makeappx = Get-ChildItem "C:/Program Files (x86)/Windows Kits/10/bin" -Recurse -Filter "makeappx.exe" -ErrorAction Ignore |
            Where-Object { $_.FullName -match '\\x64\\' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $makeappx) { throw "makeappx.exe not found in installed Windows SDKs" }

          $msixDir = "$releaseDir/bundle/msix"
          New-Item -ItemType Directory -Force -Path $msixDir | Out-Null
          $msixPath = "$msixDir/recast_${version}_x64.msix"
          & $makeappx.FullName pack /d $staging /p $msixPath /o
          if ($LASTEXITCODE -ne 0) { throw "makeappx pack failed with exit code $LASTEXITCODE" }
          Write-Output "Created $msixPath"

      - name: Prepare release assets
        shell: pwsh
        run: |
          $assetDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          $bundleRoots = @(
            "apps/desktop/src-tauri/target/release/bundle",
            "apps/desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle"
          )
          $extensions = @(".AppImage", ".deb", ".dmg", ".exe", ".msi", ".msix", ".sig", ".json")
          $assets = @()
          foreach ($root in $bundleRoots) {
            if (Test-Path -LiteralPath $root) {
              $assets += Get-ChildItem -Path $root -Recurse -File | Where-Object {
                $extensions -contains $_.Extension
              }
            }
          }
          if (-not $assets) {
            throw "No release assets found for ${{ matrix.platform.name }}"
          }
          foreach ($asset in $assets) {
            Copy-Item -LiteralPath $asset.FullName -Destination $assetDir -Force
            Write-Output "Prepared $($asset.Name)"
          }

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: release-assets/*

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          draft: true
          prerelease: false
          files: release-assets/*
          fail_on_unmatched_files: true

      - name: Upload build artifacts (debug aid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recast-${{ matrix.platform.name }}-${{ needs.create-release.outputs.tag_name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*
            apps/desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/**/*
          if-no-files-found: ignore
          retention-days: 7

  publish-release:
    name: Publish release
    needs: [create-release, build-desktop]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          draft: false
          prerelease: false
