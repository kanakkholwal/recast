name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

concurrency:
  group: release-desktop-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.23.0"
  RUST_BACKTRACE: "1"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  # FFmpeg version pinned for reproducible release builds. Bump deliberately;
  # do NOT track "latest". The Windows build comes from gyan.dev's release
  # essentials archive; macOS from evermeet.cx; Linux from johnvansickle.com.
  FFMPEG_VERSION: "7.1"

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      tag_name: ${{ steps.resolve_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: resolve_tag
        shell: bash
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create or reuse draft release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: Recast ${{ steps.resolve_tag.outputs.tag }}
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation and signing notes
            These builds may show OS security prompts because code-signing is currently limited.
            If blocked by OS warnings, install manually and verify from the repository:
            https://github.com/kanakkholwal/recast

  build-desktop:
    name: Build (${{ matrix.platform.name }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - name: macos-x64
            os: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
          - name: linux-x64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ""
          - name: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ""
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"
          key: ${{ matrix.platform.rust_target }}
          shared-key: tauri-${{ matrix.platform.name }}
          cache-on-failure: true

      - name: Cache turbo build outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ matrix.platform.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ matrix.platform.os }}-

      - name: Install Linux system dependencies
        if: matrix.platform.os == 'ubuntu-24.04'
        run: |
          # The `pipewire` Rust crate 0.9.x (a transitive dependency of `xcap`)
          # generates bindings against PipeWire >= 1.4. Ubuntu 24.04 ships
          # PipeWire 1.0.5, which omits fields like `spa_video_info_raw.flags`
          # and changes `modifier` from u64 to i64 — producing the libspa
          # build errors we hit. Pulling pipewire-upstream's PPA gives us the
          # newer headers without locking the runner image to a future Ubuntu.
          sudo add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache FFmpeg sidecars
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: apps/desktop/src-tauri/binaries
          key: ffmpeg-${{ env.FFMPEG_VERSION }}-${{ matrix.platform.rust_target }}

      - name: Download FFmpeg sidecars (Windows)
        if: matrix.platform.os == 'windows-latest' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $triple = "${{ matrix.platform.rust_target }}"
          $dest = "apps/desktop/src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extract -Force
          $bin = Get-ChildItem -Path ffmpeg-extract -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $probe = Get-ChildItem -Path ffmpeg-extract -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          if (-not $bin -or -not $probe) { throw "ffmpeg/ffprobe not found in archive" }
          Copy-Item $bin.FullName "$dest/ffmpeg-$triple.exe" -Force
          Copy-Item $probe.FullName "$dest/ffprobe-$triple.exe" -Force
          Remove-Item -Recurse -Force ffmpeg.zip, ffmpeg-extract

      - name: Download FFmpeg sidecars (macOS)
        if: matrix.platform.os == 'macos-latest' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          triple="${{ matrix.platform.rust_target }}"
          dest="apps/desktop/src-tauri/binaries"
          mkdir -p "$dest"
          # evermeet.cx ships universal2 binaries that work on both arm64 and x64.
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o ffmpeg.zip
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o ffprobe.zip
          unzip -o ffmpeg.zip -d ffmpeg-extract
          unzip -o ffprobe.zip -d ffmpeg-extract
          cp ffmpeg-extract/ffmpeg "$dest/ffmpeg-$triple"
          cp ffmpeg-extract/ffprobe "$dest/ffprobe-$triple"
          chmod +x "$dest/ffmpeg-$triple" "$dest/ffprobe-$triple"
          rm -rf ffmpeg.zip ffprobe.zip ffmpeg-extract

      - name: Download FFmpeg sidecars (Linux)
        if: matrix.platform.os == 'ubuntu-24.04' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          triple="${{ matrix.platform.rust_target }}"
          dest="apps/desktop/src-tauri/binaries"
          mkdir -p "$dest"
          curl -L "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" -o ffmpeg.tar.xz
          mkdir -p ffmpeg-extract
          tar -xf ffmpeg.tar.xz -C ffmpeg-extract --strip-components=1
          cp ffmpeg-extract/ffmpeg "$dest/ffmpeg-$triple"
          cp ffmpeg-extract/ffprobe "$dest/ffprobe-$triple"
          chmod +x "$dest/ffmpeg-$triple" "$dest/ffprobe-$triple"
          rm -rf ffmpeg.tar.xz ffmpeg-extract

      - name: Verify FFmpeg sidecars (encoders required for export)
        shell: bash
        run: |
          set -euo pipefail
          triple="${{ matrix.platform.rust_target }}"
          dest="apps/desktop/src-tauri/binaries"
          if [[ "${{ matrix.platform.os }}" == "windows-latest" ]]; then
            bin="$dest/ffmpeg-$triple.exe"
          else
            bin="$dest/ffmpeg-$triple"
          fi
          [[ -x "$bin" ]] || { echo "::error::ffmpeg sidecar missing or not executable: $bin"; exit 1; }
          encoders=$("$bin" -hide_banner -encoders)
          for codec in libx264 aac libvpx-vp9 libopus; do
            if ! echo "$encoders" | grep -q " $codec "; then
              echo "::error::Required encoder missing from bundled ffmpeg: $codec"
              exit 1
            fi
          done
          "$bin" -version | head -n1

      - name: Build frontend (via turbo)
        run: pnpm turbo run build --filter=recast-desktop

      - name: Build & publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: ./apps/desktop
          tagName: ${{ needs.create-release.outputs.tag_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform.tauri_args }}

      - name: Upload build artifacts (debug aid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recast-${{ matrix.platform.name }}-${{ needs.create-release.outputs.tag_name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*
            apps/desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/**/*
          if-no-files-found: ignore
          retention-days: 7

  publish-release:
    name: Publish release
    needs: [create-release, build-desktop]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          draft: false
          prerelease: false
